  triggers:
    military:    [airstrike, air strike, missile strike, missile attack, missiles fired, drone strike, bombing, bombs, invasion, invades, ground offensive, military strike, retaliatory strike, resumes strikes, resume strikes, launches strike, launches strikes, attack on, attacks on, troops cross, ground assault, troops killed, soldiers killed, civilian casualties, war intensifies, fighting intensifies, escalates strikes, strikes escalate, strikes intensify, heavy bombing, heavier bombing, more bombing, fires on, fires at, fired upon, fired on, opens fire, gunfire on, struck iranian, struck iran, hits iranian, attacks iranian, strikes iranian, bombs iranian, us fires, us strikes, us attacks, israel strikes, israel attacks, exchanges fire, returns fire, kills iranian, killed iranian, military action, military operation, military intervention]
