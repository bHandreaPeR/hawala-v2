# Event-class keyword dictionary.
#
# Each class:
#   direction      : -1 (bearish for NIFTY) or +1 (bullish for NIFTY)
#   base_magnitude : 0..1 (base impact)
#   triggers       : groups of phrases (lower-case, multi-word OK).
#                    Match if any phrase appears as a substring in the
#                    normalized headline.
#   region_boost   : optional. Multiplier when a region keyword is present.
#                    Best match wins; default 1.0.
#   negation_blockers : list of token-pair lists. If BOTH tokens of a pair
#                       appear within 6 tokens of each other, the match is
#                       suppressed. e.g. [ceasefire, broken] kills "ceasefire
#                       broken as fighting resumes".
#
# corporate_india_megacap is special: direction is dynamic (set by
# positive_triggers vs negative_triggers).

geopolitical_deescalation:
  direction: +1
  base_magnitude: 0.6
  triggers:
    peace:     [peace deal, peace pact, peace agreement, peace treaty, peace breakthrough, peace plan, peace accord, peace hopes, peace optimism, peace progress, peace talk, peace process, peace framework, peace memo, hopes of peace, hopes for peace]
    ceasefire: [ceasefire, cease-fire, truce, armistice, stop fighting, halt hostilities, end of hostilities, lay down arms, cease hostilities, halt fighting, end fighting, end the war, end the conflict, end war, ending the war, ending hostilities, hostilities end, war ends, war over]
    sanctions: [sanctions lifted, sanctions removed, sanctions eased, sanctions relief, sanctions waived, ease sanctions, lift sanctions, remove sanctions, ease restrictions, drop sanctions, suspend sanctions, sanctions suspended]
    talks:     [talks resume, dialogue resumed, negotiations breakthrough, agreement reached, deal reached, deal signed, breakthrough talks, deal closer, closer to deal, closing in on deal, closing in on agreement, closing in on memo, near deal, near agreement, nearing deal, nearing agreement, move closer to deal, moving closer to deal, move closer to agreement, deal in sight, deal imminent, agreement imminent, memo to end, memo to end war, one-page memo, framework deal, mou signed, sign mou, draft deal, draft agreement]
    withdrawal: [troops withdraw, troop pullout, military withdrawal, troops pull out, withdraw forces, pull back troops, retreat forces, military pullback]
    diplomacy: [normalize relations, restore ties, resume diplomatic, diplomatic breakthrough, diplomatic progress, diplomatic resolution, talks progress, progress on deal, progress on talks, progress on peace, suspends operation, halts operation, suspended operations]
    de_risk:   [tensions ease, tension eases, tensions cool, conflict de-escalates, de-escalation, deescalation, war risk eases, geopolitical risk eases]
  region_boost:
    iran: 1.3
    russia: 1.1
    ukraine: 1.1
    china: 1.0
    korea: 0.9
    israel: 1.2
    middle east: 1.2
    gaza: 1.1
    hormuz: 1.3
  negation_blockers:
    - [peace, fails]
    - [peace, collapse]
    - [peace, rejected]
    - [ceasefire, broken]
    - [ceasefire, violated]
    - [ceasefire, collapsed]
    - [ceasefire, rejected]
    - [sanctions, expanded]
    - [sanctions, imposed]
    - [talks, collapse]
    - [talks, fail]

